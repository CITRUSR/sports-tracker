version: "3.9"

services:
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile.yml
    ports:
      - "5173:5173"
    volumes:
      - ./front:/app
      - /app/node_modules
    networks:
      - local
    depends_on:
      - backend
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile.yml
    ports:
      - "5000:5000"
    networks:
      - local
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000;

networks:
  local:
    driver: bridge
