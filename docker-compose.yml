version: "3.9"

services:
  frontend-prod:
    build:
      context: ./front
      dockerfile: Dockerfile.prod.yml
    ports:
      - "80:80"
    networks:
      - local
    restart: unless-stopped
    depends_on:
      - backend
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile.yml
    ports:
      - "5173:5173"
    networks:
      - local
    depends_on:
      - backend
    volumes:
      - ./front:/app
      - /app/node_modules
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile.yml
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - local
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000;
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
    depends_on:
      - db
  db:
    image: postgres:18
    networks:
      - local
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  local:
    driver: bridge

volumes:
  db_data: