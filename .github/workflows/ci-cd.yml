name: CI/CD Docker Compose Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Check existing directories before build
        run: |
          echo "Проверяем существующие папки в tests/back.UnitTests до сборки:"
          ls -R /home/runner/work/sports-tracker/sports-tracker/tests/back.UnitTests/ || echo "Не удалось найти папки."

      - name: Build and test backend
        run: |
          echo "Собираем проект с подробным выводом..."
          cd tests/back.UnitTests
          dotnet restore
          dotnet build --configuration Release --verbosity normal

      - name: Check existing directories after build
        run: |
          echo "Проверяем существующие папки в tests/back.UnitTests после сборки:"
          ls -R /home/runner/work/sports-tracker/sports-tracker/tests/back.UnitTests/ || echo "Не удалось найти папки."

      - name: Run tests
        run: |
          echo "Запуск тестов..."
          dotnet test --no-build --configuration Release --verbosity normal

      - name: SSH Deploy with Docker Compose
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "Разворачиваем приложение на сервере..."
            cd ~/sports-tracker
            git pull
            docker compose up frontend-prod backend db -d --build